name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against (defaults to production)'
        required: false
        default: 'https://sanctum.garden'

# Let a newer push supersede an in-flight run.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (deployed site)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://sanctum.garden' }}
      # Repo secret with a known low-value fallback. The purge endpoint is also
      # hard-restricted to e2e+* emails server-side, so this can never harm a
      # real account even if the fallback token is public.
      E2E_ADMIN_TOKEN: ${{ secrets.E2E_ADMIN_TOKEN || 'sanctum-e2e-purge' }}
    steps:
      - uses: actions/checkout@v4

      # Capture the version that's live RIGHT NOW, before Cloudflare Workers Builds
      # has had time to roll out this push. /api/health exposes the deployed
      # version id (Cloudflare version-metadata). The gate below waits until it
      # changes, so we always test THIS commit's code, never the previous deploy.
      - name: Capture currently-deployed version
        run: echo "BASELINE_VERSION=$(curl -s "$BASE_URL/api/health" | jq -r '.version // empty')" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      # A push to main deploys via Cloudflare Workers Builds AND starts this job at
      # the same time. Wait until the deployed version id differs from the baseline
      # captured above — that's the new code going live. Falls back to proceeding
      # after ~10m so a missing version field can never wedge the run.
      - name: Wait for the new deployment to go live
        run: |
          echo "Baseline version: ${BASELINE_VERSION:-<none>}"
          for i in $(seq 1 60); do
            cur=$(curl -s "$BASE_URL/api/health" | jq -r '.version // empty')
            echo "attempt $i: deployed version=${cur:-<none>}"
            if [ -n "$cur" ] && [ "$cur" != "$BASELINE_VERSION" ]; then
              echo "New deployment is live ($cur)."; exit 0
            fi
            sleep 10
          done
          echo "::warning::Deployed version did not change within ~10m; proceeding anyway."

      - name: Run E2E (desktop + mobile)
        run: npx playwright test --project=desktop --project=mobile

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
